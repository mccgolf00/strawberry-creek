<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Sheet-Tee Master</title>
    <script src="config.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a4a2e; font-family: Georgia, serif; color: #f0ead6; }
        .gold { color: #d4af37; }
        .nav-bar { display: flex; background: rgba(0,0,0,0.3); border-bottom: 1px solid #d4af37; }
        .nav-btn { flex: 1; padding: 18px; text-align: center; font-size: 11px; text-transform: uppercase; color: rgba(240,234,214,0.4); cursor: pointer; }
        .nav-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; padding: 20px; margin: 15px; }
        .player-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-gold { background: #d4af37; color: #1a4a2e; border: none; padding: 14px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

        function SheetTee() {
            const [isAuth, setIsAuth] = useState(localStorage.getItem("st_auth_" + CONFIG.clubId) === "true");
            const [view, setView] = useState("signup");
            const [pass, setPass] = useState("");
            const [roster, setRoster] = useState([]);
            const [signups, setSignups] = useState({});

            useEffect(() => {
                if (isAuth) {
                    fetchData();
                    // Live Update Listener
                    const sub = sb.channel('any').on('postgres_changes',{event:'*',schema:'public',table:'store'}, fetchData).subscribe();
                    return () => sb.removeChannel(sub);
                }
            }, [isAuth]);

            const fetchData = async () => {
                // THE CLEAN FIX: This filters by your new 'club_id' column
                const { data } = await sb.from('store').select('*').eq('club_id', CONFIG.clubId);
                setRoster(data?.find(d => d.key === 'roster')?.value || []);
                setSignups(data?.find(d => d.key === 'signups')?.value || {});
            };

            const toggle = async (name, day) => {
                const updated = { ...signups };
                if (!updated[day]) updated[day] = [];
                updated[day] = updated[day].includes(name) ? updated[day].filter(n => n !== name) : [...updated[day], name];
                await sb.from('store').upsert({ key: 'signups', value: updated, club_id: CONFIG.clubId });
            };

            if (!isAuth) return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', padding:40, textAlign:'center'}}>
                    <img src={CONFIG.logoUrl} style={{width:100, margin:'0 auto 20px'}} />
                    <h1 style={{marginBottom:10}}>{CONFIG.clubName}</h1>
                    <p className="gold" style={{fontSize:10, letterSpacing:2, marginBottom:30}}>{CONFIG.tagline}</p>
                    <input type="password" placeholder="Password" style={{background:'none', border:'1px solid #d4af37', padding:15, color:'#fff', borderRadius:8, textAlign:'center', width:'100%', marginBottom:15}} 
                           onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter' && pass === CONFIG.groupPassword && (localStorage.setItem("st_auth_"+CONFIG.clubId,"true"), setIsAuth(true))} />
                    <button className="btn-gold" onClick={() => pass === CONFIG.groupPassword ? (localStorage.setItem("st_auth_"+CONFIG.clubId,"true"), setIsAuth(true)) : alert("Denied")}>Unlock Clubhouse</button>
                </div>
            );

            return (
                <div style={{maxWidth:500, margin:'0 auto'}}>
                    <header style={{padding:40, textAlign:'center'}}>
                        <img src={CONFIG.logoUrl} style={{width:80}} />
                        <h2 style={{marginTop:10}}>{CONFIG.clubName}</h2>
                    </header>
                    <nav className="nav-bar">
                        <div className={`nav-btn ${view==='signup'?'active':''}`} onClick={()=>setView('signup')}>Sign Up</div>
                        <div className={`nav-btn ${view==='tally'?'active':''}`} onClick={()=>setView('tally')}>Who's In</div>
                    </nav>
                    <main>
                        {view === 'signup' && (
                            <div className="card">
                                <h3 className="gold" style={{fontSize:11, textAlign:'center', marginBottom:20, letterSpacing:2}}>WEEKEND ROSTER</h3>
                                {roster.map(p => (
                                    <div key={p} className="player-row">
                                        <span>{p}</span>
                                        <div style={{display:'flex', gap:20}}>
                                            <label style={{textAlign:'center'}}><div style={{fontSize:9, opacity:0.5}}>SAT</div><input type="checkbox" checked={signups.Sat?.includes(p)} onChange={()=>toggle(p,'Sat')}/></label>
                                            <label style={{textAlign:'center'}}><div style={{fontSize:9, opacity:0.5}}>SUN</div><input type="checkbox" checked={signups.Sun?.includes(p)} onChange={()=>toggle(p,'Sun')}/></label>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<SheetTee />);
    </script>
</body>
</html>
