<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Strawberry Creek - Sheet-Tee</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a4a2e; font-family: Georgia, serif; color: #f0ead6; margin: 0; padding: 0; }
        .gold { color: #d4af37; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #d4af37; border-radius: 12px; padding: 20px; margin: 20px; }
        .nav { display: flex; border-bottom: 1px solid #d4af37; background: rgba(0,0,0,0.2); }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .active { border-bottom: 3px solid #d4af37; color: #d4af37; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: #d4af37; }
        .btn { background: #d4af37; color: #1a4a2e; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        // USE YOUR ORIGINAL STRAWBERRY KEYS HERE
        const sb = supabase.createClient("https://nwizmbkurxxqcfzmrzrx.supabase.co", "YOUR_ACTUAL_STRAWBERRY_KEY");

        function App() {
            const [view, setView] = useState("signup");
            const [roster, setRoster] = useState([]);
            const [signups, setSignups] = useState({});

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                // This 'eq' filter is the ONLY thing needed to fix the "Green Screen"
                const { data } = await sb.from('store').select('*').eq('club_id', 'strawberry');
                setRoster(data?.find(d => d.key === 'roster')?.value || []);
                setSignups(data?.find(d => d.key === 'signups')?.value || {});
            };

            const toggle = async (name, day) => {
                const updated = { ...signups };
                if (!updated[day]) updated[day] = [];
                updated[day] = updated[day].includes(name) ? updated[day].filter(n => n !== name) : [...updated[day], name];
                await sb.from('store').upsert({ key: 'signups', value: updated, club_id: 'strawberry' });
                setSignups(updated);
            };

            return (
                <div style={{maxWidth: 500, margin: '0 auto'}}>
                    <div style={{textAlign: 'center', padding: '30px 0'}}>
                        <img src="./assets/logo.png" style={{width: 80}} />
                        <h2>Strawberry Creek</h2>
                    </div>
                    <div className="nav">
                        <div className={`nav-item ${view==='signup'?'active':''}`} onClick={()=>setView('signup')}>Sign Up</div>
                        <div className={`nav-item ${view==='tally'?'active':''}`} onClick={()=>setView('tally')}>Who's In</div>
                    </div>
                    {view === 'signup' ? (
                        <div className="card">
                            <h3 className="gold" style={{textAlign: 'center'}}>WEEKEND ROSTER</h3>
                            {roster.map(p => (
                                <div key={p} style={{display:'flex', justifyContent:'space-between', padding: '10px 0', borderBottom: '1px solid rgba(255,255,255,0.1)'}}>
                                    <span>{p}</span>
                                    <div>
                                        <label style={{marginRight: 10}}>SAT <input type="checkbox" checked={signups.Sat?.includes(p)} onChange={()=>toggle(p,'Sat')}/></label>
                                        <label>SUN <input type="checkbox" checked={signups.Sun?.includes(p)} onChange={()=>toggle(p,'Sun')}/></label>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="card">
                            {['Sat', 'Sun'].map(day => (
                                <div key={day} style={{marginBottom: 20}}>
                                    <h4 className="gold">{day.toUpperCase()}</h4>
                                    <div style={{display:'flex', flexWrap:'wrap', gap: 10}}>
                                        {signups[day]?.map(n => <span key={n} style={{background:'rgba(212,175,55,0.1)', padding:'5px 10px', borderRadius:5}}>{n}</span>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
