    function getWeekendDates() {
      const now = new Date();
      const day = now.getDay(); 
      let diffToSat;
      if (day === 6) diffToSat = 0;        
      else if (day === 0) diffToSat = -1;  
      else if (day === 5) diffToSat = 1;   
      else diffToSat = (6 - day + 7) % 7; 
      const w1sat = new Date(now); w1sat.setDate(now.getDate() + diffToSat);
      const dates = {};
      const offsets = { fri1:-1, sat:0, sun:1, mon1:2, fri2:6, fri:7, mon:8, mon2:9 };
      const fmtFull = (d) => d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
      const fmtDay  = (d) => String(d.getDate());
      const fmtMon  = (d) => d.toLocaleDateString("en-US", { month:"short" });
      Object.entries(offsets).forEach(([k,o]) => {
        const d = new Date(w1sat); d.setDate(w1sat.getDate() + o);
        dates[k] = { full: fmtFull(d), day: fmtDay(d), mon: fmtMon(d), date: d };
      });
      const key = `${w1sat.getFullYear()}-${w1sat.getMonth()}-${w1sat.getDate()}`;
      return { dates, key };
    }

    function chunkEvenly(arr) {
      if (!arr.length) return [];
      const n = arr.length;
      const numGroups = Math.ceil(n / 4);
      const base = Math.floor(n / numGroups);
      const remainder = n % numGroups;
      const groups = [];
      let idx = 0;
      for (let g = 0; g < numGroups; g++) {
        const size = base + (g < remainder ? 1 : 0);
        groups.push(arr.slice(idx, idx + size));
        idx += size;
      }
      return groups;
    }

    function compressImage(file, maxW = 800) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const canvas = document.createElement("canvas");
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.65));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function dbListen(key, cb) {
      const ch = sb.channel("store-" + key)
        .on("postgres_changes", { event: "*", schema: "public", table: "store", filter: `key=eq.${key}` },
          payload => {
            if (payload.new && payload.new.club_id === "strawberry") {
              cb(payload.new.value ?? null);
            }
          })
        .subscribe();
      return () => sb.removeChannel(ch);
    }

      async function toggle(name, day) {
        const latestSignups = await dbGet(`signups-${weekKey}`) || {};
        const latestOrder   = await dbGet(`order-${weekKey}`)   || { sat:[], sun:[] };
        const cur    = latestSignups[name] || { sat:false, sun:false };
        const wasIn  = !!cur[day];
        const nextSignups = { ...latestSignups, [name]: { ...cur, [day]: !wasIn } };
        const curOrder = latestOrder[day] || [];
        let nextOrder;
        if (wasIn) {
          nextOrder = shuffle(curOrder.filter(n => n !== name));
        } else {
          nextOrder = shuffle([...curOrder, name]);
        }
        setFlash(name+day); setTimeout(()=>setFlash(null),700);
        await dbSet(`signups-${weekKey}`, nextSignups);
        await dbSet(`order-${weekKey}`, { ...latestOrder, [day]: nextOrder });
      }

      async function uploadPhoto(file, wall, nameOverride, capOverride) {
        if (!file) return;
        setUploading(true);
        try {
          const dataUrl = await compressImage(file);
          const keyMap = { pics: "photos-all", bunker: "bunker-all", ace: "ace-all" };
          const setterMap = { pics: setPhotos, bunker: setBunkerPhotos, ace: setAcePhotos };
          const key = keyMap[wall];
          const setter = setterMap[wall];
          const latest = await dbGet(key) || [];
          const photo = { id:Date.now(), dataUrl, caption:(capOverride??"")?.trim()||"", uploader:"", ts:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) };
          const next = [photo, ...latest];
          setter(next);
          await dbSet(key, next);
        } catch(e) { console.error(e); }
        setUploading(false);
      }

      async function deletePhoto(id, wall) {
        const maps = {
          pics:   { cur:photos,       setter:setPhotos,       key:"photos-all" },
          bunker: { cur:bunkerPhotos, setter:setBunkerPhotos, key:"bunker-all" },
          ace:    { cur:acePhotos,    setter:setAcePhotos,    key:"ace-all"    },
        };
        const { cur, setter, key } = maps[wall];
        deletingRef.current = true;
        const next = cur.filter(p => p.id !== id);
        setter(next);
        setLightboxList(next);
        if (next.length === 0) {
          setLightbox(null);
        } else {
          const newIdx = Math.min(cur.findIndex(p=>p.id===id), next.length - 1);
          setLightbox({...next[newIdx], wall});
        }
        await dbSet(key, next);
        setTimeout(() => { deletingRef.current = false; }, 2000);
      }

              })}
            </>}
            {view==="photos"&&<PhotoWall wallPhotos={photos} wallKey="pics" uploaderVal={uploaderName} setUploaderVal={setUploaderName} captionVal={caption} setCaptionVal={setCaption} fileInputRef={fileRef} accent="#d4af37" multi={true}/>}
            {view==="bunker"&&<PhotoWall wallPhotos={bunkerPhotos} wallKey="bunker" uploaderVal={bunkerUploader} setUploaderVal={setBunkerUploader} captionVal={bunkerCaption} setCaptionVal={setBunkerCaption} fileInputRef={bunkerRef} accent="#7ec8a0" showTagline={false} multi={true}/>}
            {view==="ace"&&(!aceUnlocked?(
              <div style={C.lockBox}><button style={C.addBtn} onClick={handleAceLogin}>Enter</button></div>
            ):<PhotoWall wallPhotos={acePhotos} wallKey="ace" uploaderVal={aceUploader} setUploaderVal={setAceUploader} captionVal={aceCaption} setCaptionVal={setAceCaption} fileInputRef={aceRef} accent="#d4af37"/>)}
            {view==="admin"&&(!adminUnlocked?(
              <button style={C.addBtn} onClick={handleAdminLogin}>Unlock</button>
            ):<>
              <div style={C.label}>Roster</div>
              {players.map((p,i)=><div key={i} style={C.aRow}>{p}</div>)}
              <button style={{...C.addBtn,color:"#e05c5c"}} onClick={clearWeek}>Clear All</button>
            </>)}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
    (function() {
      var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone) return;
      var WEEK = 7*24*60*60*1000;
      var now = Date.now();
      if (now - parseInt(localStorage.getItem('pwa-dismissed')||0) < WEEK) return;
      if (now - parseInt(localStorage.getItem('pwa-shown')||0) < WEEK) return;
      localStorage.setItem('pwa-shown', now);
      var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';

      var card = document.createElement('div');
      card.style.cssText = 'background:#1a4a2e;border:2px solid #d4af37;border-radius:20px;padding:32px 28px;max-width:320px;width:100%;text-align:center;font-family:Georgia,serif;position:relative;';

      card.innerHTML = '<button id="pwa-x" style="position:absolute;top:12px;right:16px;background:none;border:none;color:rgba(212,175,55,0.5);font-size:20px;cursor:pointer;">&#x2715;</button><img src="https://sheet-tee.github.io/strawberry-creek/golf-ball.png" style="width:130px;height:130px;object-fit:contain;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;"/><div style="font-size:16px;font-weight:bold;color:#f0ead6;margin-bottom:20px;line-height:1.5;">For the best user experience,<br/>please add the app:</div><div id="pwa-btns" style="display:flex;gap:12px;justify-content:center;margin-bottom:20px;"><button id="pwa-add" style="background:#d4af37;border:none;color:#0d3d22;padding:11px 24px;border-radius:8px;font-family:Georgia,serif;font-size:14px;font-weight:bold;cursor:pointer;">Add App</button><button id="pwa-no" style="background:none;border:1px solid rgba(212,175,55,0.4);color:rgba(240,234,214,0.6);padding:11px 24px;border-radius:8px;font-family:Georgia,serif;font-size:14px;cursor:pointer;">No</button></div><div style="font-size:18px;font-weight:bold;color:#d4af37;letter-spacing:2px;">SHEET-TEE</div>';

      overlay.appendChild(card);
      document.body.appendChild(overlay);

      function dismiss() {
        localStorage.setItem('pwa-dismissed', Date.now());
        overlay.remove();
      }

      document.getElementById('pwa-x').onclick = dismiss;
      document.getElementById('pwa-no').onclick = dismiss;

      var deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
      });

      document.getElementById('pwa-add').onclick = function() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function() {
            localStorage.setItem('pwa-dismissed', Date.now());
            overlay.remove();
          });
        } else {
          var instructions = isIOS
            ? 'Tap <strong>Share</strong> &#8594; then<br/><strong>Add to Home Screen</strong>'
            : 'Tap the browser menu &#8594; then<br/><strong>Add to Home Screen</strong>';
          document.getElementById('pwa-btns').innerHTML = '<div style="font-size:13px;color:#d4af37;line-height:1.8;margin-bottom:16px;">' + instructions + '</div><button id="pwa-gotit" style="background:#d4af37;border:none;color:#0d3d22;padding:11px 24px;border-radius:8px;font-family:Georgia,serif;font-size:14px;font-weight:bold;cursor:pointer;">Got it</button>';
          document.getElementById('pwa-gotit').onclick = dismiss;
        }
      };
    })();
  </script>
</body>
</html>
